name: PHPStan Analysis

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-22.04

    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '8.2'
            moodle-branch: 'MOODLE_405_STABLE'
          - php: '8.3'
            moodle-branch: 'MOODLE_405_STABLE'
          - php: '8.4'
            moodle-branch: 'MOODLE_500_STABLE'

    steps:
      - name: Setup moodle-branch
        uses: actions/checkout@v4
        with:
          repository: 'moodle/moodle'
          ref: ${{ matrix.moodle-branch }}
          path: .

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: ${{ matrix.extensions }}
          ini-values: max_input_vars=5000
          # If you are not using code coverage, keep "none". Otherwise, use "pcov" (Moodle 3.10 and up) or "xdebug".
          # If you try to use code coverage with "none", it will fallback to phpdbg (which has known problems).
          coverage: none

      - name: Initialise moodle-plugin-ci
        run: |
          composer create-project -n --no-dev --prefer-dist moodlehq/moodle-plugin-ci ci ^4
          echo $(cd ci/bin; pwd) >> $GITHUB_PATH
          echo $(cd ci/vendor/bin; pwd) >> $GITHUB_PATH
          sudo locale-gen en_AU.UTF-8
          echo "NVM_DIR=$HOME/.nvm" >> $GITHUB_ENV

      - name: Install moodle-plugin-ci
        run: |
          moodle-plugin-ci add-plugin catalyst/moodle-gradingform_rubric_ranges
        env:
          DB: ${{ matrix.database }}
          MOODLE_BRANCH: ${{ matrix.moodle-branch }}
          # Uncomment this to run Behat tests using the Moodle App.
          # MOODLE_APP: 'true'

      - name: Check out repository code
        uses: actions/checkout@v4
        with:
          path: ./local/learnwise

      - name: Install PHPStan
        run: |
          composer require --dev micaherne/phpstan-moodle

      - name: Copy config
        run: |
          cp config-dist.php config.php

      - name: Run PHPStan on local/learnwise
        run: |

          # Run PHPStan on the local/learnwise directory
          vendor/bin/phpstan analyse local/learnwise -c local/learnwise/phpstan.neon
